version: 2

updates:
  # Backend — Python (uv/pip ecosystem)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python-deps:
        patterns: ["*"]
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps):"

  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-deps:
        patterns: ["*"]
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci):"
